const NQ = Math.min(50, POOL.length); // number of position slots on screen

// Longer questions are a wide-screen treat: they'd shrink the whole field on a
// phone, so we only deal them when there's room.
const SHORT_MAX = 40;           // everyday length
const LONG_MAX = 56;            // longest "treat" length
const WIDE_THRESHOLD = 800;     // css px; below this, skip the long ones
function allowLong() { return window.innerWidth >= WIDE_THRESHOLD; }

// Active pool: the inline POOL, or a live questions.json if present.
let activePool = POOL;

// Deck: a shuffled queue of the whole active pool. A question is dealt from the
// FRONT when a slot activates and returned to the BACK when it leaves the
// screen, so it can't reappear until the rest of the pool has cycled through.
let deck = [];
function refillDeck() {
  deck = activePool.slice();
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
}
function deckNext() {
  const long = allowLong();
  // On narrow screens, skip long questions (rotate them to the back, unshown).
  for (let tries = 0; tries < deck.length; tries++) {
    if (deck.length === 0) refillDeck();
    const q = deck.shift();
    if (!long && q.length > SHORT_MAX) { deck.push(q); continue; }
    return q;
  }
  if (deck.length === 0) refillDeck();
  return deck.shift();
}

// Optional live pool: if questions.json is present (e.g. refreshed by a
// scheduled generator and pushed to the repo), use it; otherwise fall back to
// the inline POOL. Filled in by loadPool() before the first build.
async function loadPool() {
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 3000);
    const res = await fetch('questions.json?t=' + Date.now(), { cache: 'no-store', signal: ctrl.signal });
    clearTimeout(to);
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data)) return null;
    const clean = data.filter(s => typeof s === 'string' && s.trim().length > 0).map(s => s.trim());
    return clean.length >= NQ ? clean : null; // ignore too-small / malformed sets
  } catch (e) {
    return null; // offline / missing / bad JSON -> inline POOL
  }
}

/* Palette (CSS rgb) */
const PALETTE_CSS = [
  [0x5B, 0x2D, 0x8E], // deep violet
  [0xA8, 0xE6, 0x3D], // acid green
  [0xF0, 0xA5, 0x00], // warm amber
  [0x00, 0xC8, 0xC8], // cold cyan
  [0xE0, 0x70, 0x90], // dusty rose
];
const NCOL = PALETTE_CSS.length;

/* Tunables */
const FONT_PX = 18;          // base glyph height; scaled to fit the viewport
const MARGIN  = 0.05;
const BREEZE  = true;        // slow "fabric in a breeze" baseline drift — set false to disable
const LOUPE_MAGNIFY = true;  // subtle glass magnification under the cursor — set false for just a ring
const LOUPE_SS = 3;          // supersample factor for the loupe's crisp vector buffer
const LOUPE_GAMMA = 2.0;     // >1 suppresses fading questions in the loupe so it reveals the crisp, present ones

const textCanvas = document.getElementById('text');
const tctx = textCanvas.getContext('2d', { willReadFrequently: true });
// Offscreen buffer: the area under the loupe, re-rendered from the vector text
// at LOUPE_SS resolution so the magnifier samples crisp glyphs, not the coarser
// main-canvas pixels.
const loupeCanvas = document.createElement('canvas');
const lctx = loupeCanvas.getContext('2d', { willReadFrequently: true });
// alpha (0..255) -> pow(alpha/255, LOUPE_GAMMA), precomputed so the loupe's
// fade-suppression is a table lookup, not a pow() per sampled pixel.
const gammaLUT = new Float32Array(256);
for (let _v = 0; _v < 256; _v++) gammaLUT[_v] = Math.pow(_v / 255, LOUPE_GAMMA);

/* ----------------------- helpers ----------------------- */
function fontStr(px, w) { return `${w} ${px}px Inter, 'Helvetica Neue', Arial, sans-serif`; }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function clampAxis(v, lo, hi, fallback) {
  if (hi <= lo) return fallback;
  return Math.max(lo, Math.min(hi, v));
}

function easeInOutCubic(x) {
  return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

function smoothstep(a, b, x) {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

// Best-candidate (blue-noise) sampling: even coverage, organic, no grid.
function bestCandidate(n, W, H, margin) {
  const mx = margin * W, my = margin * H;
  const rw = (1 - 2 * margin) * W, rh = (1 - 2 * margin) * H;
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (pts.length === 0) { pts.push([mx + Math.random() * rw, my + Math.random() * rh]); continue; }
    const k = Math.min(24, 6 + pts.length);
    let best = null, bestD = -1;
    for (let c = 0; c < k; c++) {
      const x = mx + Math.random() * rw, y = my + Math.random() * rh;
      let nearest = Infinity;
      for (const p of pts) {
        const dx = p[0] - x, dy = p[1] - y, dd = dx * dx + dy * dy;
        if (dd < nearest) nearest = dd;
      }
      if (nearest > bestD) { bestD = nearest; best = [x, y]; }
    }
    pts.push(best);
  }
  return pts;
}

// Each question rides its own wavy, tilted baseline so overlaps cross at
// different slopes/curves and stay legible.
function makeWave(fontPx, width) {
  let amp = fontPx * (0.22 + Math.random() * 0.5);
  const periods = 0.4 + Math.random() * 0.9;
  const freq = width > 1 ? (periods * Math.PI * 2) / width : 0.01;
  // Cap the baseline slope so short questions don't curl tightly enough for
  // the rotated glyphs to fold over each other. Short words have a high freq,
  // so this clamps their amplitude to a gentle curve; long words keep theirs.
  const MAX_SLOPE = 0.28;
  amp = Math.min(amp, MAX_SLOPE / freq);
  const phase = Math.random() * Math.PI * 2;
  return { amp, freq, phase };
}

function layoutChars(text, fontPx, wave, tilt) {
  tctx.font = fontStr(fontPx, 400);
  const ct = Math.cos(tilt), st = Math.sin(tilt);
  let x = 0;
  const chars = [];
  const glyphs = Array.from(text); // split on code points, not UTF-16 units
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (let gi = 0; gi < glyphs.length; gi++) {
    const ch = glyphs[gi];
    let w = tctx.measureText(ch).width;
    // Glyphs are placed one at a time, so the font's pair kerning is lost —
    // "W", "V", "T" etc. sit too far from the letter after them. Fold the kern
    // for this pair back into the advance so e.g. "Wh" tucks in as intended.
    if (gi + 1 < glyphs.length) {
      const next = glyphs[gi + 1];
      w += tctx.measureText(ch + next).width - w - tctx.measureText(next).width;
    }
    // store the pre-wave advance (ax); the wave/tilt are re-applied per frame
    // in the renderer so the baseline can drift slowly, like fabric.
    const yy = wave.amp * Math.sin(x * wave.freq + wave.phase);
    const X = x * ct - yy * st;
    const Y = x * st + yy * ct;
    chars.push({ ch, ax: x });
    if (X < minx) minx = X; if (X > maxx) maxx = X;
    if (Y < miny) miny = Y; if (Y > maxy) maxy = Y;
    // Advance along the CURVE, not flat. Each glyph is drawn rotated to the
    // local baseline tangent, so a flat step of w would drop the next origin
    // w·sqrt(1+slope^2) away along the curve, opening a gap on steep/rounded
    // sections (most visible at the leading letter). Shrink the horizontal
    // step so consecutive origins stay ~w apart measured along the baseline.
    const slope = wave.amp * wave.freq * Math.cos(x * wave.freq + wave.phase);
    x += w / Math.sqrt(1 + slope * slope);
  }
  return { chars, width: x, minx, maxx, miny, maxy };
}

/* ----------------------- schedule ----------------------- *
 * A small live scheduler. The page starts empty; one question fades in
 * almost immediately, then the rest arrive gently. At most CAP questions
 * are ever on screen at once (it typically breathes a bit below that), so
 * the field never feels crowded. Each question fades black -> colour ->
 * black, then rests for a long dormant gap before it can return. */
const CAP = 11;                 // hard ceiling of simultaneous questions
// Intro arrivals are paced to the long-run rate (~one new question every few
// seconds) so the field fills GENTLY to ~8 and breathes, instead of slamming
// the cap. First question still appears almost immediately.
const INTRO_GAP = 3.2;          // seconds between the first appearances

const order = shuffle(Array.from({ length: NQ }, (_, i) => i));
const state = new Array(NQ);
order.forEach((qi, rank) => {
  state[qi] = {
    active: false, startT: 0, activeDur: 0, rampIn: 0, rampOut: 0,
    nextStart: 0.2 + rank * INTRO_GAP,   // first appearance (gentle intro)
  };
});

function randActive()  { return 18 + Math.random() * 16; }   // 18–34s visible
// After Fischli/Weiss: questions "slowly appear and quickly fade".
function randRampIn()  { return 4.5 + Math.random() * 3; }   // slow materialize (4.5–7.5s)
function randRampOut() { return 1 + Math.random() * 1; }     // quick fade-out (1–2s)
function randDormant() { return 70 + Math.random() * 120; }  // long rest, 70–190s

// Advance the scheduler: retire finished questions, then admit waiting ones
// up to the cap (longest-waiting first).
const MAX_PER_COLOR = 2;         // never more than this many of one hue on screen

function updateSchedule(time) {
  let activeCount = 0;
  const perColor = new Array(NCOL).fill(0);
  for (let i = 0; i < NQ; i++) {
    const s = state[i];
    if (!s.active) continue;
    if (time - s.startT >= s.activeDur) {
      s.active = false;
      s.nextStart = time + randDormant();
      // return this question to the back of the deck
      if (layout[i] && layout[i].text) { deck.push(layout[i].text); layout[i].text = null; }
    } else {
      activeCount++;
      perColor[layout[i].cssIdx]++;
    }
  }
  if (activeCount >= CAP) return;
  const elig = [];
  for (let i = 0; i < NQ; i++) {
    const s = state[i];
    if (!s.active && s.nextStart <= time) elig.push(i);
  }
  elig.sort((a, b) => state[a].nextStart - state[b].nextStart);
  for (let k = 0; k < elig.length && activeCount < CAP; k++) {
    const i = elig[k];
    const col = layout[i].cssIdx;
    if (perColor[col] >= MAX_PER_COLOR) continue; // avoid 3+ of a colour at once
    state[i].active = true; state[i].startT = time;
    state[i].activeDur = randActive();
    state[i].rampIn = randRampIn(); state[i].rampOut = randRampOut();
    relayoutSlot(i, deckNext());   // deal a fresh question into this slot
    activeCount++; perColor[col]++;
  }
}

// brightness 0..1 for question i — slow fade up from black, quick fade back.
function brightAt(i, time) {
  const s = state[i];
  if (!s.active) return 0;
  const local = time - s.startT;
  const rIn = Math.min(s.rampIn, s.activeDur * 0.6);
  const rOut = Math.min(s.rampOut, s.activeDur - rIn);
  let a;
  if (local < rIn) a = local / rIn;                          // slow materialize
  else if (local < s.activeDur - rOut) a = 1;                // hold (crisp)
  else a = (s.activeDur - local) / rOut;                     // quick fade to black
  return easeInOutCubic(Math.max(0, Math.min(1, a)));
}

/* ----------------------- layout ----------------------- */
const layout = []; // { cx, cy, rcx, rcy, cssIdx, fontPx, chars, bcx, bcy, text }

// Lay a dealt question into a slot: compute its wavy/tilted glyphs, and clamp
// the render center (rcx/rcy) so this particular text stays fully on screen.
function relayoutSlot(i, text) {
  const L = layout[i];
  if (!L) return;
  const W = window.innerWidth, H = window.innerHeight;
  const fontPx = L.fontPx;
  tctx.font = fontStr(fontPx, 400);
  const width = tctx.measureText(text).width;
  const wave = makeWave(fontPx, width);
  const tilt = (Math.random() < 0.5 ? -1 : 1) * (5 + Math.random() * 7) * Math.PI / 180;
  const lay = layoutChars(text, fontPx, wave, tilt);
  L.chars = lay.chars;
  L.wave = wave; L.tilt = tilt;
  // very slow, faintly random baseline drift — a scarf in a breeze.
  // BREEZE=false => drift 0 => the baseline is static, exactly as before.
  L.drift = BREEZE ? (0.028 + Math.random() * 0.03) * (Math.random() < 0.5 ? -1 : 1) : 0;
  L.bcx = (lay.minx + lay.maxx) * 0.5;
  L.bcy = (lay.miny + lay.maxy) * 0.5 - fontPx * 0.32; // center the ink, not the baseline
  L.text = text;
  const halfW = (lay.maxx - lay.minx) * 0.5 + fontPx * 0.7;
  const halfH = (lay.maxy - lay.miny) * 0.5 + fontPx * 0.9;
  L.hw = halfW; L.hh = halfH;
  L.rcx = clampAxis(L.cx, MARGIN * W + halfW, (1 - MARGIN) * W - halfW, W * 0.5);
  L.rcy = clampAxis(L.cy, MARGIN * H + halfH, (1 - MARGIN) * H - halfH, H * 0.5);
}

function build() {
  const W = window.innerWidth, H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  textCanvas.width = Math.floor(W * dpr);
  textCanvas.height = Math.floor(H * dpr);
  tctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const margin = MARGIN;
  const usableW = (1 - margin * 2) * W, usableH = (1 - margin * 2) * H;

  // Uniform font. Size it to the NORMAL (short) questions so an occasional
  // long one doesn't shrink the whole field — long ones just run wider (and
  // only appear on wide screens). maxDealW covers whatever can be dealt here,
  // for same-colour separation and the on-screen clamp.
  const long = allowLong();
  let maxNormalW = 1, maxDealW = 1, sumW = 0, cnt = 0;
  tctx.font = fontStr(FONT_PX, 400);
  for (const q of activePool) {
    if (q.length > LONG_MAX) continue;
    const dealable = long || q.length <= SHORT_MAX;
    if (!dealable) continue;
    const w = tctx.measureText(q).width;
    if (q.length <= SHORT_MAX && w > maxNormalW) maxNormalW = w;
    if (w > maxDealW) maxDealW = w;
    sumW += w; cnt++;
  }
  const avgW = sumW / Math.max(1, cnt);
  const areaSum = NQ * (avgW + FONT_PX) * (FONT_PX * 1.9);
  const fscale = Math.min(
    1,
    (usableW * 0.62) / maxNormalW,           // fit the normal questions
    Math.sqrt((usableW * usableH * 0.55) / areaSum)
  );
  const fontPx = FONT_PX * fscale;
  const maxW = maxDealW;                       // widest question that can appear

  // half-extents: MAX (widest text) drives same-colour separation; NOMINAL
  // (avg text) drives lenient different-colour spacing and base placement.
  const hwMax = maxW * fscale * 0.5 + fontPx * 0.7;
  const hhMax = fontPx * 1.62;
  const hwNom = avgW * fscale * 0.5 + fontPx * 0.7;
  const hhNom = fontPx * 1.25;

  const seeds = bestCandidate(NQ, W, H, margin);
  const cxs = new Float32Array(NQ), cys = new Float32Array(NQ);
  const cidx = new Int32Array(NQ);
  const mX = margin * W, mY = margin * H;
  for (let i = 0; i < NQ; i++) {
    cidx[i] = i % NCOL;
    cxs[i] = clampAxis(seeds[i][0], mX + hwNom, W - mX - hwNom, W * 0.5);
    cys[i] = clampAxis(seeds[i][1], mY + hhNom, H - mY - hhNom, H * 0.5);
  }

  // Relax: SAME-colour slots fully separated at max width (never hue-on-hue);
  // different colours may overlap and cross (lenient, nominal width).
  const SGAP = 10;
  for (let it = 0; it < 400; it++) {
    for (let i = 0; i < NQ; i++) {
      for (let j = i + 1; j < NQ; j++) {
        const dx = cxs[j] - cxs[i], dy = cys[j] - cys[i];
        const same = cidx[i] === cidx[j];
        const minx = same ? (2 * hwMax + SGAP) : (2 * hwNom) * 0.55;
        const miny = same ? (2 * hhMax + SGAP) : (2 * hhNom) * 0.45;
        const ox = minx - Math.abs(dx), oy = miny - Math.abs(dy);
        if (ox > 0 && oy > 0) {
          if (ox < oy) {
            const s = (dx === 0 ? (Math.random() - 0.5) : Math.sign(dx)) * ox * 0.5;
            cxs[i] -= s; cxs[j] += s;
          } else {
            const s = (dy === 0 ? (Math.random() - 0.5) : Math.sign(dy)) * oy * 0.5;
            cys[i] -= s; cys[j] += s;
          }
        }
      }
    }
    for (let i = 0; i < NQ; i++) {
      cxs[i] = clampAxis(cxs[i], mX + hwNom, W - mX - hwNom, W * 0.5);
      cys[i] = clampAxis(cys[i], mY + hhNom, H - mY - hhNom, H * 0.5);
    }
  }

  const oldTexts = layout.map(l => l.text);
  layout.length = 0;
  for (let i = 0; i < NQ; i++) {
    layout.push({
      cx: cxs[i], cy: cys[i], rcx: cxs[i], rcy: cys[i],
      cssIdx: cidx[i], fontPx, chars: [], bcx: 0, bcy: 0,
      text: oldTexts[i] || null,
    });
  }
  // Re-lay-out any currently-active slots for the new size/position (resize).
  for (let i = 0; i < NQ; i++) {
    if (state[i].active) relayoutSlot(i, layout[i].text || deckNext());
  }
}

/* ----------------------- loupe (glass cursor) ----------------------- */
const mouse = { x: 0, y: 0, inside: false };
// per-segment rim state so the colour catch is positional and eases in/out
const RIM_N = 48;
const rimGlow = new Float32Array(RIM_N);
const rimColor = Array.from({ length: RIM_N }, () => [255, 255, 255]);
window.addEventListener('pointermove', (e) => {
  if (e.pointerType === 'touch') { mouse.inside = false; return; }
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.inside = true;
});
window.addEventListener('pointerdown', (e) => {
  if (e.pointerType !== 'touch') { mouse.x = e.clientX; mouse.y = e.clientY; mouse.inside = true; }
});
document.addEventListener('mouseleave', () => { mouse.inside = false; });
window.addEventListener('blur', () => { mouse.inside = false; });

function drawLoupe(time) {
  if (!mouse.inside) return;
  const R = 30, mx = mouse.x, my = mouse.y;          // smaller loupe
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  // region under the loupe (device pixels), clamped to the canvas
  const bx = Math.max(0, Math.round((mx - R) * dpr));
  const by = Math.max(0, Math.round((my - R) * dpr));
  const bw = Math.min(textCanvas.width - bx, Math.round(2 * R * dpr));
  const bh = Math.min(textCanvas.height - by, Math.round(2 * R * dpr));
  if (bw <= 0 || bh <= 0) return;
  let srcImg;
  try { srcImg = tctx.getImageData(bx, by, bw, bh); } catch (e) { return; }
  const src = srcImg.data;
  const cx = mx * dpr - bx, cy = my * dpr - by; // loupe centre in local device px
  const Rdev = R * dpr;

  if (LOUPE_MAGNIFY) {
    // Re-render the area under the loupe straight from the vector text into a
    // supersampled buffer, so the magnifier samples crisp glyphs instead of the
    // coarser main-canvas pixels — no pixelation. The buffer spans the world
    // square [mx-R, mx+R] x [my-R, my+R] at LOUPE_SS px per CSS px.
    const SS = LOUPE_SS, S = Math.round(2 * R * SS), Sm = S - 1;
    if (loupeCanvas.width !== S) { loupeCanvas.width = S; loupeCanvas.height = S; }
    lctx.setTransform(1, 0, 0, 1, 0, 0);
    lctx.clearRect(0, 0, S, S);
    lctx.setTransform(SS, 0, 0, SS, -(mx - R) * SS, -(my - R) * SS);
    renderQuestions(lctx, time);
    lctx.setTransform(1, 0, 0, 1, 0, 0);
    const buf = lctx.getImageData(0, 0, S, S).data;

    // A true, smooth lens: magnification is zoomC at the centre and eases to
    // exactly 1x at the rim, so the edge blends seamlessly with the
    // surroundings — no doubling, no banding.
    const zoomC = 1.32;
    const out = tctx.createImageData(bw, bh);
    const o = out.data;
    for (let y = 0; y < bh; y++) {
      for (let x = 0; x < bw; x++) {
        const di = (y * bw + x) << 2;
        // this device pixel in world (CSS) coords, then radial magnification
        const wx = (bx + x) / dpr, wy = (by + y) / dpr;
        const dxc = wx - mx, dyc = wy - my;
        const rr = Math.sqrt(dxc * dxc + dyc * dyc);
        let sx, sy;
        if (rr < R) {
          const rn = rr / R;                          // 0 centre .. 1 rim
          const m = 1 + (zoomC - 1) * (1 - rn * rn);  // zoomC -> 1 at rim
          sx = mx + dxc / m; sy = my + dyc / m;
        } else { sx = wx; sy = wy; }                  // outside lens: identity
        // sample the supersampled buffer (bilinear, premultiplied) at that point
        const fx = (sx - (mx - R)) * SS, fy = (sy - (my - R)) * SS;
        let x0 = Math.floor(fx), y0 = Math.floor(fy);
        const tx = fx - x0, ty = fy - y0;
        let x1 = x0 + 1, y1 = y0 + 1;
        if (x0 < 0) x0 = 0; else if (x0 > Sm) x0 = Sm;
        if (x1 < 0) x1 = 0; else if (x1 > Sm) x1 = Sm;
        if (y0 < 0) y0 = 0; else if (y0 > Sm) y0 = Sm;
        if (y1 < 0) y1 = 0; else if (y1 > Sm) y1 = Sm;
        const i00 = (y0 * S + x0) << 2, i10 = (y0 * S + x1) << 2;
        const i01 = (y1 * S + x0) << 2, i11 = (y1 * S + x1) << 2;
        // Weight each sample by pow(alpha, gamma): bakes the fade into colour
        // AND suppresses partly-faded questions, so the loupe reveals the crisp,
        // fully-present ones rather than showing everything at full strength.
        const w00 = gammaLUT[buf[i00 + 3]] * (1 - tx) * (1 - ty);
        const w10 = gammaLUT[buf[i10 + 3]] * tx * (1 - ty);
        const w01 = gammaLUT[buf[i01 + 3]] * (1 - tx) * ty;
        const w11 = gammaLUT[buf[i11 + 3]] * tx * ty;
        o[di]     = (buf[i00]     * w00 + buf[i10]     * w10 + buf[i01]     * w01 + buf[i11]     * w11) | 0;
        o[di + 1] = (buf[i00 + 1] * w00 + buf[i10 + 1] * w10 + buf[i01 + 1] * w01 + buf[i11 + 1] * w11) | 0;
        o[di + 2] = (buf[i00 + 2] * w00 + buf[i10 + 2] * w10 + buf[i01 + 2] * w01 + buf[i11 + 2] * w11) | 0;
        o[di + 3] = 255;
      }
    }
    tctx.putImageData(out, bx, by); // identity outside the circle => seamless
  }

  // Positional colour catch: each segment of the rim picks up the colour
  // directly under it, easing in and out over time for a soft, glassy fade.
  for (let k = 0; k < RIM_N; k++) {
    const a = (k / RIM_N) * Math.PI * 2, ca = Math.cos(a), sa = Math.sin(a);
    let r = 0, g = 0, bl = 0, n = 0;
    for (const rr of [0.62, 0.78, 0.92]) {   // sample a few points across the rim
      const px = (cx + Rdev * rr * ca) | 0, py = (cy + Rdev * rr * sa) | 0;
      if (px >= 0 && px < bw && py >= 0 && py < bh) {
        const i = (py * bw + px) << 2, af = gammaLUT[src[i + 3]]; // bake+suppress fade in the sample
        r += src[i] * af; g += src[i + 1] * af; bl += src[i + 2] * af; n++;
      }
    }
    let target = 0;
    if (n > 0) {
      r /= n; g /= n; bl /= n;
      const bright = r + g + bl;
      target = Math.max(0, Math.min(1, (bright - 12) / 200));
      if (bright > 12) rimColor[k] = [Math.round(r), Math.round(g), Math.round(bl)];
    }
    rimGlow[k] += (target - rimGlow[k]) * 0.08; // ease in AND out
  }
  const grad = tctx.createConicGradient(0, mx, my);
  for (let k = 0; k <= RIM_N; k++) {
    const kk = k % RIM_N, c = rimColor[kk];
    // brighten the caught hue so the glow reads, still scaled by the fade
    const glow = rimGlow[kk];
    const boost = 1.5;
    grad.addColorStop(k / RIM_N,
      `rgba(${Math.min(255, c[0] * boost) | 0},${Math.min(255, c[1] * boost) | 0},${Math.min(255, c[2] * boost) | 0},${(glow * 0.5).toFixed(3)})`);
  }
  tctx.save();
  tctx.globalCompositeOperation = 'lighter';
  tctx.beginPath(); tctx.arc(mx, my, R, 0, Math.PI * 2);
  tctx.lineWidth = 3.5; tctx.strokeStyle = grad; tctx.stroke();
  tctx.restore();

  // faint glass rim + a soft top-left highlight
  tctx.save();
  tctx.beginPath(); tctx.arc(mx, my, R, 0, Math.PI * 2);
  tctx.lineWidth = 1; tctx.strokeStyle = 'rgba(255,255,255,0.20)'; tctx.stroke();
  tctx.beginPath(); tctx.arc(mx, my, R - 1, Math.PI * 1.05, Math.PI * 1.62);
  tctx.lineWidth = 1.2; tctx.strokeStyle = 'rgba(255,255,255,0.10)'; tctx.stroke();
  tctx.restore();
}

/* ----------------------- render ----------------------- */
let startTime = 0;
let lastFrame = 0;

function frame(now) {
  // When Safari (or any browser) backgrounds the tab, requestAnimationFrame
  // pauses while performance.now() keeps counting real time. On return, `now`
  // has jumped ahead by the whole away period. Left unchecked, one frame would
  // expire every active question and mark every dormant one "due," slamming the
  // field to its cap all at once with a synchronized batch. Freeze the clock
  // across any long gap so the piece resumes exactly where it left off.
  if (lastFrame && now - lastFrame > 500) startTime += now - lastFrame;
  lastFrame = now;
  const time = (now - startTime) / 1000;
  const W = window.innerWidth, H = window.innerHeight;

  updateSchedule(time);

  tctx.clearRect(0, 0, W, H);
  renderQuestions(tctx, time);
  drawLoupe(time);

  requestAnimationFrame(frame);
}

// Draw every live question into a context, in CSS-pixel coordinates. Used for
// the main canvas and, at higher resolution, for the loupe's magnifier buffer.
function renderQuestions(ctx, time) {
  ctx.globalCompositeOperation = 'lighter'; // overlaps blend like projected light
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  for (let i = 0; i < NQ; i++) {
    const b = brightAt(i, time);
    if (b <= 0.004) continue;
    const L = layout[i];
    if (!L.chars.length) continue;
    const c = PALETTE_CSS[L.cssIdx];
    // slowly drift the wave phase while the question is up (fabric in a breeze)
    const w = L.wave, ct = Math.cos(L.tilt), st = Math.sin(L.tilt);
    const dphase = (time - state[i].startT) * L.drift;
    ctx.save();
    ctx.translate(L.rcx - L.bcx, L.rcy - L.bcy);
    ctx.font = fontStr(L.fontPx, 400);
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${b.toFixed(3)})`; // black -> colour -> black
    for (const ch of L.chars) {
      const p = ch.ax * w.freq + w.phase + dphase;
      const yy = w.amp * Math.sin(p);
      const rot = Math.atan(w.amp * w.freq * Math.cos(p)) + L.tilt;
      ctx.save();
      ctx.translate(ch.ax * ct - yy * st, ch.ax * st + yy * ct);
      ctx.rotate(rot);
      ctx.fillText(ch.ch, 0, 0);
      ctx.restore();
    }
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ----------------------- boot ----------------------- */
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(build, 200);
});

async function boot() {
  const pool = await loadPool();          // live questions.json, or null
  if (pool) activePool = pool;
  refillDeck();
  build();
  startTime = performance.now();
  requestAnimationFrame(frame);
}

if (document.fonts && document.fonts.load) {
  Promise.race([
    Promise.all([
      document.fonts.load(`400 ${FONT_PX}px Inter`),
      document.fonts.load(`300 ${FONT_PX}px Inter`),
    ]).then(() => document.fonts.ready),
    new Promise(res => setTimeout(res, 1500)),
  ]).then(boot);
} else {
  boot();
}
</script>
