<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Question Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #gl   { z-index: 1; }
  #text { z-index: 2; pointer-events: none; }
  /* A title that quietly dissolves with the rest. */
  #colophon {
    position: fixed; left: 14px; bottom: 12px; z-index: 3;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 200; font-size: 11px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.18); pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <canvas id="text"></canvas>
</div>
<div id="colophon">QUESTION FIELD — after Fischli / Weiss</div>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 *  QUESTION FIELD
 *  A durational, self-running WebGL2 particle piece.
 *  Questions coalesce out of black particles, hold, then dissolve.
 *  Vanilla JS + GLSL. No libraries. Particles ARE the letters.
 * ------------------------------------------------------------------ */

/* ----- The questions (existential / trivial / absurd) ----- */
const QUESTIONS = [
  "Is this the right way?",
  "Will I remember this?",
  "Am I suffering from good taste?",
  "Is the cat happy?",
  "Does anyone know where I put it?",
  "What do the others think?",
  "Is it too late?",
  "Was that it?",
  "Should I have stayed in bed?",
  "Why is everything the way it is?",
  "Am I doing enough?",
  "Who turned off the lights?",
  "Is the soup still warm?",
  "Do plants get bored?",
  "Where does the time go?",
  "Did I lock the door?",
  "Is anyone watching?",
  "What if I am wrong about everything?",
  "Are we there yet?",
  "Is it supposed to feel like this?",
  "Can the moon see me?",
  "Have I become my parents?",
  "Is this a good idea?",
  "Why do I keep doing that?",
  "Does the dog dream of me?",
  "Should I say something?",
  "Is the universe expanding into anything?",
  "What was I going to say?",
  "Am I the problem?",
  "Is silence empty or full?",
  "Did I leave the stove on?",
  "Why is it so quiet?",
  "Will it rain on the weekend?",
  "Am I allowed to rest?",
  "Is everyone else pretending too?",
  "Does the past still exist somewhere?",
  "What do my hands want?",
  "Is this love or just convenience?",
  "Where do thoughts go?",
  "Should I have called?",
  "Is the milk still good?",
  "Why do I want what I want?",
  "Are mountains tired of standing?",
  "Is it okay to be ordinary?",
  "What happens if I let go?",
  "Did the bread rise?",
  "Am I running out of time?",
  "Who decided what is normal?",
  "Is the world getting louder?",
  "Will any of this matter?"
];
const NQ = QUESTIONS.length; // 50

/* ----- Palette (0..1 RGB) ----- */
const PALETTE = [
  [0x5B/255, 0x2D/255, 0x8E/255], // deep violet
  [0xA8/255, 0xE6/255, 0x3D/255], // acid green
  [0xF0/255, 0xA5/255, 0x00/255], // warm amber
  [0x00/255, 0xC8/255, 0xC8/255], // cold cyan
  [0xE0/255, 0x70/255, 0x90/255], // dusty rose
];
const PALETTE_CSS = PALETTE.map(c => c.map(v => Math.round(v * 255)));

/* ----- Tunables ----- */
const PARTICLES_PER_QUESTION = 7000; // within the 8k spirit; 50 q's run at once
const SUPERSAMPLE = 4;               // glyph raster oversampling for dense grain
const FONT_PX = 17;                   // displayed glyph height (thin grotesque)
const SCATTER_SIGMA = 62;             // dormant cloud radius (css px)

/* ================================================================== */

const glCanvas   = document.getElementById('gl');
const textCanvas = document.getElementById('text');
const tctx = textCanvas.getContext('2d');
const gl = glCanvas.getContext('webgl2', { antialias: true, alpha: false, premultipliedAlpha: false });
if (!gl) {
  document.body.innerHTML =
    '<div style="color:#888;font-family:sans-serif;padding:2em">WebGL2 is required for Question Field.</div>';
  throw new Error('WebGL2 not supported');
}

/* ----------------------- Shaders ----------------------- */
const VERT = `#version 300 es
precision highp float;

in vec2  aScatter;   // dormant home (css px)
in vec2  aGlyph;     // formed target (css px)
in vec2  aCenter;    // question center (css px) — shrink anchor
in vec3  aColor;     // final saturated hue
in float aId;        // question index
in float aSeed;      // per-particle randomness

uniform vec2  uRes;            // css resolution
uniform float uTime;           // seconds
uniform float uDpr;            // device pixel ratio
uniform float uForm[${NQ}];    // 0=scattered .. 1=letterform
uniform float uBright[${NQ}];  // 0=black .. 1=saturated hue
uniform float uScale[${NQ}];   // letterform scale (shrinks while fading out)

out vec3  vColor;

// cheap value noise ------------------------------------------------
float hash(vec2 p){
  p = fract(p * vec2(123.34, 345.45));
  p += dot(p, p + 34.345);
  return fract(p.x * p.y);
}
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
// cubic ease in/out -----------------------------------------------
float easeCubic(float x){
  return x < 0.5 ? 4.0*x*x*x : 1.0 - pow(-2.0*x + 2.0, 3.0) * 0.5;
}

void main(){
  int id = int(aId + 0.5);
  float form   = clamp(uForm[id],   0.0, 1.0); // position blend
  float bright = clamp(uBright[id], 0.0, 1.0); // colour saturation
  float scale  = uScale[id];                   // letterform shrink

  // per-particle fade from black: each pixel ignites/extinguishes at its own
  // moment within the question's rise/fall, so letters fade up out of black
  // (and back down) as they form rather than all at once.
  float pb = smoothstep(aSeed * 0.55, aSeed * 0.55 + 0.45, bright);

  // low-amplitude drift while dormant; fades out as the glyph forms
  float t = uTime * 0.06;
  vec2 q = aScatter * 0.012;
  float nx = noise(q + vec2(t, 0.0) + aSeed * 11.0);
  float ny = noise(q + vec2(0.0, -t) + 31.4 + aSeed * 7.0);
  vec2 drift = (vec2(nx, ny) - 0.5) * 2.0 * 24.0 * (1.0 - form);

  // micro shimmer once formed, so letters breathe
  float ms = uTime * 1.7;
  vec2 micro = (vec2(noise(q*4.0 + ms + aSeed*3.0),
                     noise(q*4.0 - ms + 7.0)) - 0.5) * 1.6 * form;

  // letterform target, gently shrunk toward the question center while fading
  vec2 glyph = mix(aCenter, aGlyph, scale);
  vec2 pos = mix(aScatter + drift, glyph + micro, form);

  vec2 clip = (pos / uRes) * 2.0 - 1.0;
  clip.y = -clip.y;
  gl_Position = vec4(clip, 0.0, 1.0);

  // particles shrink a touch as the question fades back to black
  gl_PointSize = mix(1.5, 2.5, form) * mix(0.8, 1.0, pb) * uDpr;

  // colour: black -> deep chromatic mid-tone -> saturated hue
  vec3 black = vec3(0.0);
  vec3 mid   = aColor * 0.30 + vec3(0.015);
  vec3 hue   = aColor;
  vec3 col   = pb < 0.5
      ? mix(black, mid, smoothstep(0.0, 0.5, pb))
      : mix(mid,   hue, smoothstep(0.5, 1.0, pb));
  vColor = col * (0.55 + 0.45 * pb); // glow rises with saturation
}
`;

const FRAG = `#version 300 es
precision highp float;
in vec3 vColor;
out vec4 outColor;
void main(){
  vec2 c = gl_PointCoord - 0.5;
  float d = length(c);
  float alpha = smoothstep(0.5, 0.04, d);
  outColor = vec4(vColor, alpha); // additive blend; black contributes nothing
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s) + '\n' + src);
  return s;
}
const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS))
  throw new Error(gl.getProgramInfoLog(program));
gl.useProgram(program);

const loc = {
  aScatter: gl.getAttribLocation(program, 'aScatter'),
  aGlyph:   gl.getAttribLocation(program, 'aGlyph'),
  aCenter:  gl.getAttribLocation(program, 'aCenter'),
  aColor:   gl.getAttribLocation(program, 'aColor'),
  aId:      gl.getAttribLocation(program, 'aId'),
  aSeed:    gl.getAttribLocation(program, 'aSeed'),
  uRes:     gl.getUniformLocation(program, 'uRes'),
  uTime:    gl.getUniformLocation(program, 'uTime'),
  uDpr:     gl.getUniformLocation(program, 'uDpr'),
  uForm:    gl.getUniformLocation(program, 'uForm'),
  uBright:  gl.getUniformLocation(program, 'uBright'),
  uScale:   gl.getUniformLocation(program, 'uScale'),
};

const vao = gl.createVertexArray();
const buffers = { scatter: gl.createBuffer(), glyph: gl.createBuffer(), center: gl.createBuffer(),
                  color: gl.createBuffer(), id: gl.createBuffer(), seed: gl.createBuffer() };

/* ----------------------- Layout helpers ----------------------- */
// Best-candidate (blue-noise) sampling: even coverage, but organic — no grid.
function bestCandidate(n, W, H, margin) {
  const mx = margin * W, my = margin * H;
  const rw = (1 - 2 * margin) * W, rh = (1 - 2 * margin) * H;
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (pts.length === 0) {
      pts.push([mx + Math.random() * rw, my + Math.random() * rh]);
      continue;
    }
    const k = Math.min(24, 6 + pts.length); // candidates per insertion
    let best = null, bestD = -1;
    for (let c = 0; c < k; c++) {
      const x = mx + Math.random() * rw, y = my + Math.random() * rh;
      let nearest = Infinity;
      for (const p of pts) {
        const dx = p[0] - x, dy = p[1] - y;
        const dd = dx * dx + dy * dy;
        if (dd < nearest) nearest = dd;
      }
      if (nearest > bestD) { bestD = nearest; best = [x, y]; }
    }
    pts.push(best);
  }
  return pts;
}

// Clamp keeping the run on-screen; if it's wider than the usable span, center it.
function clampAxis(v, lo, hi, fallback) {
  if (hi <= lo) return fallback;
  return Math.max(lo, Math.min(hi, v));
}

function gaussian() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

/* Per-question schedule (overlapping, nothing synced) */
const schedule = QUESTIONS.map((_, i) => {
  const activeDur  = 20 + Math.random() * 20;            // 20–40s active
  // long dormant gap so only ~a third are visible at any moment
  const dormantDur = activeDur * (1.8 + Math.random() * 1.2);
  const ramp       = 3.5 + Math.random() * 2.5;          // materialize / dissolve time
  const cycle      = activeDur + dormantDur;
  // seed phase across the whole cycle => steady-state density from t=0
  const start      = Math.random() * cycle;
  return { activeDur, dormantDur, ramp, start, cycle };
});

function easeCubicJS(x) {
  return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

// Returns the three envelopes for question i:
//   form   — 0 scattered .. 1 letterform (coalesce on the way in)
//   bright — 0 black .. 1 saturated hue
//   scale  — letterform scale (1, dips to ~0.9 as it fades out)
// Materialization: particles fly in from the cloud as colour rises.
// Dissolution: letters HOLD in place, colour drains to black, slight shrink —
//   a simple fade into the background, no drift-apart.
function envelopeAt(i, time, out) {
  const s = schedule[i];
  let local = (time - s.start) % s.cycle;
  if (local < 0) local += s.cycle;
  const ramp = Math.min(s.ramp, s.activeDur * 0.45);

  if (local >= s.activeDur) {            // dormant: invisible, reset to cloud
    out.form = 0; out.bright = 0; out.scale = 1;
  } else if (local < ramp) {             // materialize: coalesce + colour in
    const e = easeCubicJS(local / ramp);
    out.form = e; out.bright = e; out.scale = 1;
  } else if (local > s.activeDur - ramp) { // dissolve: fade out + shrink in place
    const e = easeCubicJS((s.activeDur - local) / ramp); // 1 -> 0
    out.form = 1;                        // stay formed (no drifting apart)
    out.bright = e;                      // colour drains to black
    out.scale = 0.90 + 0.10 * e;         // shrink a touch while fading
  } else {                               // hold
    out.form = 1; out.bright = 1; out.scale = 1;
  }
}

/* ----------------------- Build particle field ----------------------- */
let totalCount = 0;
const layout = []; // per-question: {cx, cy, color, cssIdx, fontPx}

const rasterCanvas = document.createElement('canvas');
const rctx = rasterCanvas.getContext('2d', { willReadFrequently: true });

function fontStr(px) {
  return `300 ${px}px Inter, 'Helvetica Neue', Arial, sans-serif`;
}

// Each question rides its own baseline (after the hand-lettered wavy lines in
// the Guggenheim installation). Waves vary a lot in amplitude/frequency/phase
// so overlapping questions never share the same curve.
function makeWave(fontPx, width) {
  const amp = fontPx * (0.22 + Math.random() * 0.55);
  const periods = 0.55 + Math.random() * 1.25;        // ~half to ~1.8 waves
  const freq = width > 1 ? (periods * Math.PI * 2) / width : 0.01;
  const phase = Math.random() * Math.PI * 2;
  return { amp, freq, phase };
}

// Lay characters along the wave, then tilt the whole baseline so neighbouring
// questions run at different slopes and stay legible where they cross.
function layoutChars(text, fontPx, wave, tilt) {
  rctx.font = fontStr(fontPx);
  const ct = Math.cos(tilt), st = Math.sin(tilt);
  let x = 0;
  const chars = [];
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (const ch of text) {
    const w = rctx.measureText(ch).width;
    const yy = wave.amp * Math.sin(x * wave.freq + wave.phase);
    const wr = Math.atan(wave.amp * wave.freq * Math.cos(x * wave.freq + wave.phase));
    const X = x * ct - yy * st;          // rotate baseline by tilt
    const Y = x * st + yy * ct;
    chars.push({ ch, x: X, y: Y, rot: wr + tilt });
    if (X < minx) minx = X; if (X > maxx) maxx = X;
    if (Y < miny) miny = Y; if (Y > maxy) maxy = Y;
    x += w;
  }
  return { chars, width: x, minx, maxx, miny, maxy };
}

// Rasterize the wavy text (supersampled) and return particle attractor points,
// centered on the glyph-run's bounding box. bcx/bcy are that center expressed
// in the same local frame as char positions, so the overlay can align to it.
function rasterSample(chars, fontPx) {
  const s = SUPERSAMPLE;
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (const c of chars) {
    if (c.x < minx) minx = c.x; if (c.x > maxx) maxx = c.x;
    if (c.y < miny) miny = c.y; if (c.y > maxy) maxy = c.y;
  }
  if (!isFinite(minx)) { minx = maxx = miny = maxy = 0; }
  const pad = fontPx * 1.9;                 // room for glyph height + tilt
  const widthC = (maxx - minx) + pad * 2;
  const heightC = (maxy - miny) + pad * 2;
  const offX = pad - minx, offY = pad - miny;

  rasterCanvas.width = Math.ceil(widthC * s);
  rasterCanvas.height = Math.ceil(heightC * s);
  rctx.setTransform(s, 0, 0, s, 0, 0);
  rctx.clearRect(0, 0, widthC, heightC);
  rctx.font = fontStr(fontPx);
  rctx.fillStyle = '#fff';
  rctx.textBaseline = 'alphabetic';
  rctx.textAlign = 'left';
  rctx.translate(offX, offY);
  for (const c of chars) {
    rctx.save();
    rctx.translate(c.x, c.y);
    rctx.rotate(c.rot);
    rctx.fillText(c.ch, 0, 0);
    rctx.restore();
  }
  rctx.setTransform(1, 0, 0, 1, 0, 0);

  const W = rasterCanvas.width, H = rasterCanvas.height;
  const data = rctx.getImageData(0, 0, W, H).data;
  const raw = [];
  let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 130) {
        const lx = x / s - offX;   // local frame: matches char x
        const ly = y / s - offY;
        raw.push(lx, ly);
        if (lx < minX) minX = lx; if (lx > maxX) maxX = lx;
        if (ly < minY) minY = ly; if (ly > maxY) maxY = ly;
      }
    }
  }
  const bcx = (minX + maxX) * 0.5, bcy = (minY + maxY) * 0.5;
  const local = new Float32Array(raw.length);
  for (let k = 0; k < raw.length; k += 2) {
    local[k]     = raw[k]     - bcx;
    local[k + 1] = raw[k + 1] - bcy;
  }
  return { local, bcx, bcy };
}

function build() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  glCanvas.width = Math.floor(W * dpr);
  glCanvas.height = Math.floor(H * dpr);
  textCanvas.width = Math.floor(W * dpr);
  textCanvas.height = Math.floor(H * dpr);
  tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gl.viewport(0, 0, glCanvas.width, glCanvas.height);

  const margin = 0.05;
  layout.length = 0;

  // ---- 1. typography: per-question font (scaled to fit), wave, char layout ----
  // Pass A: pick a raw font + measure, so we can scale everything to the
  // viewport. All 50 boxes must fit without overlap, even in phone portrait.
  // Only shrink enough that the widest question fits the width (keeps text
  // readable at ~14–18px on desktop, a little smaller on narrow phones).
  const usableW = (1 - margin * 2) * W, usableH = (1 - margin * 2) * H;
  let maxW = 1, areaSum = 0;
  const rawFont = new Float32Array(NQ);
  for (let i = 0; i < NQ; i++) {
    const fp = FONT_PX + (Math.random() - 0.5) * 4;
    rawFont[i] = fp;
    rctx.font = fontStr(fp);
    const w = rctx.measureText(QUESTIONS[i]).width;
    if (w > maxW) maxW = w;
    areaSum += (w + fp) * (fp * 1.9);
  }
  // Shrink just enough that (a) the widest line is ~55% of the width and
  // (b) the boxes occupy a modest area fraction — both give lines room to
  // spread so same-colour questions can fully separate, even on phones.
  const fscale = Math.min(
    1,
    (usableW * 0.55) / maxW,
    Math.sqrt((usableW * usableH * 0.5) / areaSum)
  );

  // even but organic coverage (blue-noise), no obvious grid
  const seeds = bestCandidate(NQ, W, H, margin);

  const cxs = new Float32Array(NQ), cys = new Float32Array(NQ);
  const hws = new Float32Array(NQ), hhs = new Float32Array(NQ);
  const cidx = new Int32Array(NQ);            // palette index per question
  const meta = [];
  for (let i = 0; i < NQ; i++) {
    cidx[i] = i % PALETTE.length;
    const fontPx = rawFont[i] * fscale;
    rctx.font = fontStr(fontPx);
    const width = rctx.measureText(QUESTIONS[i]).width;
    const wave = makeWave(fontPx, width);
    // baseline tilt: alternating-ish slopes so overlaps cross, not merge
    const tilt = (Math.random() < 0.5 ? -1 : 1) * (6 + Math.random() * 9) * Math.PI / 180;
    const lay = layoutChars(QUESTIONS[i], fontPx, wave, tilt);
    meta.push({ fontPx, wave, chars: lay.chars });

    // half-extents from the actual (tilted) bounding box
    const hw = (lay.maxx - lay.minx) * 0.5 + fontPx * 0.7;
    const hh = (lay.maxy - lay.miny) * 0.5 + fontPx * 0.9;
    cxs[i] = clampAxis(seeds[i][0], margin * W + hw, (1 - margin) * W - hw, W * 0.5);
    cys[i] = clampAxis(seeds[i][1], margin * H + hh, (1 - margin) * H - hh, H * 0.5);
    hws[i] = hw;
    hhs[i] = hh;
  }

  // ---- 2. relax: keep the even spread and stop near-total stacking, but
  //          ALLOW overlap — distinct tilts/curves keep crossings legible.
  //          But never let two SAME-colour questions overlap (no hue-on-hue
  //          mush, e.g. yellow on yellow): those get full separation. ----
  const KX = 0.55, KY = 0.45;     // <1 => different colours may overlap
  const SGAP = 10;                // gap between same-colour boxes (css px)
  const mX = margin * W, mY = margin * H;
  for (let it = 0; it < 400; it++) {
    for (let i = 0; i < NQ; i++) {
      for (let j = i + 1; j < NQ; j++) {
        const dx = cxs[j] - cxs[i], dy = cys[j] - cys[i];
        const same = cidx[i] === cidx[j];
        const minx = same ? (hws[i] + hws[j] + SGAP) : (hws[i] + hws[j]) * KX;
        const miny = same ? (hhs[i] + hhs[j] + SGAP) : (hhs[i] + hhs[j]) * KY;
        const ox = minx - Math.abs(dx);
        const oy = miny - Math.abs(dy);
        if (ox > 0 && oy > 0) {                  // overlapping too much → ease apart
          if (ox < oy) {                          // resolve on least-penetration axis
            const s = (dx === 0 ? (Math.random() - 0.5) : Math.sign(dx)) * ox * 0.5;
            cxs[i] -= s; cxs[j] += s;
          } else {
            const s = (dy === 0 ? (Math.random() - 0.5) : Math.sign(dy)) * oy * 0.5;
            cys[i] -= s; cys[j] += s;
          }
        }
      }
    }
    for (let i = 0; i < NQ; i++) {
      cxs[i] = clampAxis(cxs[i], mX + hws[i], W - mX - hws[i], W * 0.5);
      cys[i] = clampAxis(cys[i], mY + hhs[i], H - mY - hhs[i], H * 0.5);
    }
  }

  // ---- 3. sample glyphs at final positions, gather particle data ----
  const arrays = [];
  let count = 0;
  for (let i = 0; i < NQ; i++) {
    const m = meta[i];
    const rs = rasterSample(m.chars, m.fontPx);
    const N = PARTICLES_PER_QUESTION;
    layout.push({
      cx: cxs[i], cy: cys[i], cssIdx: i % PALETTE.length,
      fontPx: m.fontPx, chars: m.chars, bcx: rs.bcx, bcy: rs.bcy,
    });
    arrays.push({
      local: rs.local, nPix: rs.local.length / 2,
      cx: cxs[i], cy: cys[i], N, color: PALETTE[i % PALETTE.length],
    });
    count += N;
  }

  totalCount = count;
  const aScatter = new Float32Array(count * 2);
  const aGlyph   = new Float32Array(count * 2);
  const aCenter  = new Float32Array(count * 2);
  const aColor   = new Float32Array(count * 3);
  const aId      = new Float32Array(count);
  const aSeed    = new Float32Array(count);

  let o = 0;
  for (let i = 0; i < NQ; i++) {
    const q = arrays[i];
    for (let n = 0; n < q.N; n++) {
      // pick a glyph pixel (cycle/duplicate with jitter if fewer than N)
      let gx, gy;
      if (q.nPix > 0) {
        const pi = (Math.floor(Math.random() * q.nPix)) * 2;
        const jit = q.N > q.nPix ? 1.1 : 0.4;
        gx = q.cx + q.local[pi]     + (Math.random() - 0.5) * jit;
        gy = q.cy + q.local[pi + 1] + (Math.random() - 0.5) * jit;
      } else {
        gx = q.cx; gy = q.cy;
      }
      aGlyph[o * 2]     = gx;
      aGlyph[o * 2 + 1] = gy;
      aCenter[o * 2]     = q.cx;
      aCenter[o * 2 + 1] = q.cy;
      aScatter[o * 2]     = q.cx + gaussian() * SCATTER_SIGMA;
      aScatter[o * 2 + 1] = q.cy + gaussian() * SCATTER_SIGMA * 0.75;
      aColor[o * 3]     = q.color[0];
      aColor[o * 3 + 1] = q.color[1];
      aColor[o * 3 + 2] = q.color[2];
      aId[o]   = i;
      aSeed[o] = Math.random();
      o++;
    }
  }

  gl.bindVertexArray(vao);
  function bind(buf, arr, loc_, size) {
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, arr, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(loc_);
    gl.vertexAttribPointer(loc_, size, gl.FLOAT, false, 0, 0);
  }
  bind(buffers.scatter, aScatter, loc.aScatter, 2);
  bind(buffers.glyph,   aGlyph,   loc.aGlyph,   2);
  bind(buffers.center,  aCenter,  loc.aCenter,  2);
  bind(buffers.color,   aColor,   loc.aColor,   3);
  bind(buffers.id,      aId,      loc.aId,      1);
  bind(buffers.seed,    aSeed,    loc.aSeed,    1);
  gl.bindVertexArray(null);
}

/* ----------------------- Render ----------------------- */
const formArr   = new Float32Array(NQ);
const brightArr = new Float32Array(NQ);
const scaleArr  = new Float32Array(NQ);
const env = { form: 0, bright: 0, scale: 1 };
let startTime = 0;

gl.clearColor(0, 0, 0, 1);
gl.disable(gl.DEPTH_TEST);
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // additive glow on black

function frame(now) {
  const time = (now - startTime) / 1000;

  for (let i = 0; i < NQ; i++) {
    envelopeAt(i, time, env);
    formArr[i] = env.form; brightArr[i] = env.bright; scaleArr[i] = env.scale;
  }

  // ---- WebGL particles ----
  gl.useProgram(program);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform2f(loc.uRes, window.innerWidth, window.innerHeight);
  gl.uniform1f(loc.uTime, time);
  gl.uniform1f(loc.uDpr, Math.min(window.devicePixelRatio || 1, 2));
  gl.uniform1fv(loc.uForm, formArr);
  gl.uniform1fv(loc.uBright, brightArr);
  gl.uniform1fv(loc.uScale, scaleArr);
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.POINTS, 0, totalCount);
  gl.bindVertexArray(null);

  // ---- crisp text, fading with the particles' saturation ----
  // Composite additively so it reads like projected light: overlapping
  // questions blend/brighten where they cross instead of occluding.
  tctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  tctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < NQ; i++) {
    const b = brightArr[i];
    if (b < 0.78) continue;
    const fade = smoothstep(0.78, 0.98, b);
    if (fade <= 0.01) continue;
    const L = layout[i];
    const c = PALETTE_CSS[L.cssIdx];
    tctx.save();
    // align the wavy run's bbox center onto the question center (matches particles)
    tctx.translate(L.cx - L.bcx, L.cy - L.bcy);
    tctx.font = `300 ${L.fontPx}px Inter, 'Helvetica Neue', Arial, sans-serif`;
    tctx.textAlign = 'left';
    tctx.textBaseline = 'alphabetic';
    tctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${(fade * 0.5).toFixed(3)})`;
    for (const ch of L.chars) {
      tctx.save();
      tctx.translate(ch.x, ch.y);
      tctx.rotate(ch.rot);
      tctx.fillText(ch.ch, 0, 0);
      tctx.restore();
    }
    tctx.restore();
  }
  tctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(frame);
}

function smoothstep(a, b, x) {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

/* ----------------------- Boot ----------------------- */
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(build, 200);
});

function boot() {
  build();
  startTime = performance.now();
  requestAnimationFrame(frame);
}

// wait for the thin grotesque to be ready so glyph sampling is accurate
if (document.fonts && document.fonts.load) {
  Promise.race([
    Promise.all([
      document.fonts.load(`300 ${FONT_PX}px Inter`),
      document.fonts.load(`200 ${FONT_PX}px Inter`),
    ]).then(() => document.fonts.ready),
    new Promise(res => setTimeout(res, 1500)), // fallback if offline
  ]).then(boot);
} else {
  boot();
}
</script>
</body>
</html>
