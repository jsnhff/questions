const NQ = Math.min(50, POOL.length);

// Draw a fresh random subset for this load (curated pool -> varied each visit).
const QUESTIONS = (() => {
  const a = POOL.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, NQ);
})();

/* Palette (CSS rgb) */
const PALETTE_CSS = [
  [0x5B, 0x2D, 0x8E], // deep violet
  [0xA8, 0xE6, 0x3D], // acid green
  [0xF0, 0xA5, 0x00], // warm amber
  [0x00, 0xC8, 0xC8], // cold cyan
  [0xE0, 0x70, 0x90], // dusty rose
];
const NCOL = PALETTE_CSS.length;

/* Tunables */
const FONT_PX = 18;          // base glyph height; scaled to fit the viewport
const MARGIN  = 0.05;

const textCanvas = document.getElementById('text');
const tctx = textCanvas.getContext('2d');

/* ----------------------- helpers ----------------------- */
function fontStr(px, w) { return `${w} ${px}px Inter, 'Helvetica Neue', Arial, sans-serif`; }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function clampAxis(v, lo, hi, fallback) {
  if (hi <= lo) return fallback;
  return Math.max(lo, Math.min(hi, v));
}

function easeInOutCubic(x) {
  return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

function smoothstep(a, b, x) {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

// Best-candidate (blue-noise) sampling: even coverage, organic, no grid.
function bestCandidate(n, W, H, margin) {
  const mx = margin * W, my = margin * H;
  const rw = (1 - 2 * margin) * W, rh = (1 - 2 * margin) * H;
  const pts = [];
  for (let i = 0; i < n; i++) {
    if (pts.length === 0) { pts.push([mx + Math.random() * rw, my + Math.random() * rh]); continue; }
    const k = Math.min(24, 6 + pts.length);
    let best = null, bestD = -1;
    for (let c = 0; c < k; c++) {
      const x = mx + Math.random() * rw, y = my + Math.random() * rh;
      let nearest = Infinity;
      for (const p of pts) {
        const dx = p[0] - x, dy = p[1] - y, dd = dx * dx + dy * dy;
        if (dd < nearest) nearest = dd;
      }
      if (nearest > bestD) { bestD = nearest; best = [x, y]; }
    }
    pts.push(best);
  }
  return pts;
}

// Each question rides its own wavy, tilted baseline so overlaps cross at
// different slopes/curves and stay legible.
function makeWave(fontPx, width) {
  let amp = fontPx * (0.22 + Math.random() * 0.5);
  const periods = 0.4 + Math.random() * 0.9;
  const freq = width > 1 ? (periods * Math.PI * 2) / width : 0.01;
  // Cap the baseline slope so short questions don't curl tightly enough for
  // the rotated glyphs to fold over each other. Short words have a high freq,
  // so this clamps their amplitude to a gentle curve; long words keep theirs.
  const MAX_SLOPE = 0.28;
  amp = Math.min(amp, MAX_SLOPE / freq);
  const phase = Math.random() * Math.PI * 2;
  return { amp, freq, phase };
}

function layoutChars(text, fontPx, wave, tilt) {
  tctx.font = fontStr(fontPx, 400);
  const ct = Math.cos(tilt), st = Math.sin(tilt);
  let x = 0;
  const chars = [];
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (const ch of text) {
    const w = tctx.measureText(ch).width;
    const yy = wave.amp * Math.sin(x * wave.freq + wave.phase);
    const wr = Math.atan(wave.amp * wave.freq * Math.cos(x * wave.freq + wave.phase));
    const X = x * ct - yy * st;
    const Y = x * st + yy * ct;
    chars.push({ ch, x: X, y: Y, rot: wr + tilt });
    if (X < minx) minx = X; if (X > maxx) maxx = X;
    if (Y < miny) miny = Y; if (Y > maxy) maxy = Y;
    x += w;
  }
  return { chars, width: x, minx, maxx, miny, maxy };
}

/* ----------------------- schedule ----------------------- *
 * A small live scheduler. The page starts empty; one question fades in
 * almost immediately, then the rest arrive gently. At most CAP questions
 * are ever on screen at once (it typically breathes a bit below that), so
 * the field never feels crowded. Each question fades black -> colour ->
 * black, then rests for a long dormant gap before it can return. */
const CAP = 11;                 // hard ceiling of simultaneous questions
// Intro arrivals are paced to the long-run rate (~one new question every few
// seconds) so the field fills GENTLY to ~8 and breathes, instead of slamming
// the cap. First question still appears almost immediately.
const INTRO_GAP = 3.2;          // seconds between the first appearances

const order = shuffle(Array.from({ length: NQ }, (_, i) => i));
const state = new Array(NQ);
order.forEach((qi, rank) => {
  state[qi] = {
    active: false, startT: 0, activeDur: 0, ramp: 0,
    nextStart: 0.2 + rank * INTRO_GAP,   // first appearance (gentle intro)
  };
});

function randActive()  { return 18 + Math.random() * 16; }   // 18–34s visible
function randRamp()    { return 3 + Math.random() * 2.5; }   // fade in/out time
function randDormant() { return 70 + Math.random() * 120; }  // long rest, 70–190s

// Advance the scheduler: retire finished questions, then admit waiting ones
// up to the cap (longest-waiting first).
function updateSchedule(time) {
  let activeCount = 0;
  for (let i = 0; i < NQ; i++) {
    const s = state[i];
    if (!s.active) continue;
    if (time - s.startT >= s.activeDur) {
      s.active = false;
      s.nextStart = time + randDormant();
    } else activeCount++;
  }
  if (activeCount >= CAP) return;
  const elig = [];
  for (let i = 0; i < NQ; i++) {
    const s = state[i];
    if (!s.active && s.nextStart <= time) elig.push(i);
  }
  elig.sort((a, b) => state[a].nextStart - state[b].nextStart);
  for (let k = 0; k < elig.length && activeCount < CAP; k++) {
    const s = state[elig[k]];
    s.active = true; s.startT = time;
    s.activeDur = randActive(); s.ramp = randRamp();
    activeCount++;
  }
}

// brightness 0..1 for question i (eased fade up from black & back down)
function brightAt(i, time) {
  const s = state[i];
  if (!s.active) return 0;
  const local = time - s.startT;
  const ramp = Math.min(s.ramp, s.activeDur * 0.45);
  let a;
  if (local < ramp) a = local / ramp;                        // fade from black
  else if (local < s.activeDur - ramp) a = 1;                // hold (crisp)
  else a = (s.activeDur - local) / ramp;                     // fade to black
  return easeInOutCubic(Math.max(0, Math.min(1, a)));
}

/* ----------------------- layout ----------------------- */
const layout = []; // { cx, cy, cssIdx, fontPx, chars, bcx, bcy }

function build() {
  const W = window.innerWidth, H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  textCanvas.width = Math.floor(W * dpr);
  textCanvas.height = Math.floor(H * dpr);
  tctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const margin = MARGIN;
  const usableW = (1 - margin * 2) * W, usableH = (1 - margin * 2) * H;

  // Pass A: measure at the (uniform) base font, then scale so the widest
  // line fits and the boxes occupy a modest area (so same-colour questions
  // can separate). Every question uses the same size.
  let maxW = 1, areaSum = 0;
  const rawFont = new Float32Array(NQ);
  for (let i = 0; i < NQ; i++) {
    const fp = FONT_PX;                       // uniform size for every question
    rawFont[i] = fp;
    tctx.font = fontStr(fp, 400);
    const w = tctx.measureText(QUESTIONS[i]).width;
    if (w > maxW) maxW = w;
    areaSum += (w + fp) * (fp * 1.9);
  }
  const fscale = Math.min(
    1,
    (usableW * 0.62) / maxW,
    Math.sqrt((usableW * usableH * 0.55) / areaSum)
  );

  const seeds = bestCandidate(NQ, W, H, margin);
  const cxs = new Float32Array(NQ), cys = new Float32Array(NQ);
  const hws = new Float32Array(NQ), hhs = new Float32Array(NQ);
  const cidx = new Int32Array(NQ);
  const meta = [];

  for (let i = 0; i < NQ; i++) {
    cidx[i] = i % NCOL;
    const fontPx = rawFont[i] * fscale;
    tctx.font = fontStr(fontPx, 400);
    const width = tctx.measureText(QUESTIONS[i]).width;
    const wave = makeWave(fontPx, width);
    const tilt = (Math.random() < 0.5 ? -1 : 1) * (5 + Math.random() * 7) * Math.PI / 180;
    const lay = layoutChars(QUESTIONS[i], fontPx, wave, tilt);

    const hw = (lay.maxx - lay.minx) * 0.5 + fontPx * 0.7;
    const hh = (lay.maxy - lay.miny) * 0.5 + fontPx * 0.9;
    cxs[i] = clampAxis(seeds[i][0], margin * W + hw, (1 - margin) * W - hw, W * 0.5);
    cys[i] = clampAxis(seeds[i][1], margin * H + hh, (1 - margin) * H - hh, H * 0.5);
    hws[i] = hw; hhs[i] = hh;
    meta.push({
      fontPx, chars: lay.chars, cssIdx: i % NCOL,
      bcx: (lay.minx + lay.maxx) * 0.5,
      bcy: (lay.miny + lay.maxy) * 0.5 - fontPx * 0.32, // center the ink, not the baseline
    });
  }

  // Relax: different colours may overlap and cross; SAME-colour questions
  // get full separation so there's never hue-on-hue mush.
  const KX = 0.55, KY = 0.45, SGAP = 10;
  const mX = margin * W, mY = margin * H;
  for (let it = 0; it < 400; it++) {
    for (let i = 0; i < NQ; i++) {
      for (let j = i + 1; j < NQ; j++) {
        const dx = cxs[j] - cxs[i], dy = cys[j] - cys[i];
        const same = cidx[i] === cidx[j];
        const minx = same ? (hws[i] + hws[j] + SGAP) : (hws[i] + hws[j]) * KX;
        const miny = same ? (hhs[i] + hhs[j] + SGAP) : (hhs[i] + hhs[j]) * KY;
        const ox = minx - Math.abs(dx), oy = miny - Math.abs(dy);
        if (ox > 0 && oy > 0) {
          if (ox < oy) {
            const s = (dx === 0 ? (Math.random() - 0.5) : Math.sign(dx)) * ox * 0.5;
            cxs[i] -= s; cxs[j] += s;
          } else {
            const s = (dy === 0 ? (Math.random() - 0.5) : Math.sign(dy)) * oy * 0.5;
            cys[i] -= s; cys[j] += s;
          }
        }
      }
    }
    for (let i = 0; i < NQ; i++) {
      cxs[i] = clampAxis(cxs[i], mX + hws[i], W - mX - hws[i], W * 0.5);
      cys[i] = clampAxis(cys[i], mY + hhs[i], H - mY - hhs[i], H * 0.5);
    }
  }

  layout.length = 0;
  for (let i = 0; i < NQ; i++) {
    layout.push({ cx: cxs[i], cy: cys[i], ...meta[i] });
  }
}

/* ----------------------- render ----------------------- */
let startTime = 0;

function frame(now) {
  const time = (now - startTime) / 1000;
  const W = window.innerWidth, H = window.innerHeight;

  updateSchedule(time);

  tctx.clearRect(0, 0, W, H);
  tctx.globalCompositeOperation = 'lighter'; // overlaps blend like projected light
  tctx.textAlign = 'left';
  tctx.textBaseline = 'alphabetic';

  for (let i = 0; i < NQ; i++) {
    const b = brightAt(i, time);
    if (b <= 0.004) continue;
    const L = layout[i];
    const c = PALETTE_CSS[L.cssIdx];
    tctx.save();
    tctx.translate(L.cx - L.bcx, L.cy - L.bcy);
    tctx.font = fontStr(L.fontPx, 400);
    tctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${b.toFixed(3)})`; // black -> colour -> black
    for (const ch of L.chars) {
      tctx.save();
      tctx.translate(ch.x, ch.y);
      tctx.rotate(ch.rot);
      tctx.fillText(ch.ch, 0, 0);
      tctx.restore();
    }
    tctx.restore();
  }
  tctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(frame);
}

/* ----------------------- boot ----------------------- */
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(build, 200);
});

function boot() {
  build();
  startTime = performance.now();
  requestAnimationFrame(frame);
}

if (document.fonts && document.fonts.load) {
  Promise.race([
    Promise.all([
      document.fonts.load(`400 ${FONT_PX}px Inter`),
      document.fonts.load(`300 ${FONT_PX}px Inter`),
    ]).then(() => document.fonts.ready),
    new Promise(res => setTimeout(res, 1500)),
  ]).then(boot);
} else {
  boot();
}
</script>
</body>
